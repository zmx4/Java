<html>
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>
  </head>
  <body>
    <h1>Login</h1>
    <form action="register" method="post">
      <label for="username">用户名:</label>
      <input type="text" id="username" name="username" required />
      <br />
      <label for="password">密码:</label>
      <input type="password" id="password" name="password" required />
      <br />
      <label for="confirmPassword">确认密码:</label>
      <input type="password" id="confirmPassword" name="confirmPassword" required />
      <br />
      <label for="email">邮箱:</label>
      <input type="email" id="email" name="email" pattern="^[A-Za-z0-9\u4e00-\u9fa5]+@[a-zA-Z0-9_-]+(\.[a-zA-Z0-9_-]+)+$" required />
      <br />
      <label for="hobbies">爱好</label>
<!--      <select name="hobbies" id="hobbies">-->
<!--        <option value="reading"></option>-->
<!--      </select>-->
      <input type="checkbox" id="hobby1" name="hobbies" value="reading" />
      <label for="hobby1">阅读</label>
      <input type="checkbox" id="hobby2" name="hobbies" value="sports" />
      <label for="hobby2">运动</label>
      <input type="checkbox" id="hobby3" name="hobbies" value="music" />
      <label for="hobby3">音乐</label>
      <br />
      <button type="submit">注册</button>
    </form>
  <script>
    const form = document.querySelector('form');
    function validateForm(event) {
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      if (password !== confirmPassword) {
        alert('密码和确认密码不匹配');
        event.preventDefault();
      }
    }
    form.addEventListener('submit', validateForm);
  </script>
  </body>
</html>
