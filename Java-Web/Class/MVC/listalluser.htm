  <script type="text/javascript "src="js/jquery-3.7.0.js"></script>
  <script type="text/javascript">
    $(document).ready(function() {
      //查询所有
      $("#search").click(function(){
        var tosearch = $("#tosearch").val();
        $.ajax({
          url : "listalluser",	//请求url
          type : "POST",	//请求类型  post|get
          data : { username : tosearch},
          dataType : "json",  //返回数据的类型 text|json|html
          success : function(data){	
            console.log(data);
             
            if (data.result){
              $("tr:not(:first)").remove();
              var tr;
              $.each(data.root, function(index, value)
              {
                tr = "<tr><td><input type='checkbox'></td><td class='uid'>"+ value.id +"</td><td>"+ value.username +"</td><td>" + value.password +"</td></tr>";
                $("#users").append(tr);  
              });
            }
          }
        });
	    });
	    
	$("#del").click(function(){
	var ids = [];
	
        //遍历选中的checkbox
        $("[type='checkbox']:checked").each(function() {
          //获取checkbox所在行的id
          var id = $(this).parents("tr").find("td.uid");
          ids.push(parseInt(id.text()));
        });	  
          
        //执行删除
        $.ajax({
          url : "deluser",	
          type : "POST",
          data : {ids : JSON.stringify(ids)},   // "[3,4]"
          //data : {ids : ids},
          dataType : "json",  
          success : function(data){	
            if (data.result){
              $("[type='checkbox']:checked").each(function() {
                //获取checkbox所在行的顺序
                n = $(this).parents("tr").index();
                $("#users").find("tr:eq(" + n + ")").remove();
              });
            }
          }
        });        
	    });	    
    });
  </script>

  <input type="text" id="tosearch" />
  <input type="button" id="search" value="查询" />
  <input type="button" id="del" value="删除" />  
  <table id="users" width="400px" height="50px" border="2px" cellspacing="0" cellpadding="0">
    <tr id="tr0">
      <td><input type="checkbox" id="checkall"></td>
      <td>ID</td>
      <td>姓名</td>
      <td>密码</td>
    </tr>
  </table>
