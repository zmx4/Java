<style>
			.wrapper {
				width: 600px;
				margin: 0 auto;
			}
 
			.modal {
				width: 100%;
				height: 100vh;
				background-color: rgba(0, 0, 0, 0.5);
				position: absolute;
				display: none;
				border: 1px solid red;
			}
 
			.modal .form {
				width: 500px;
				height: 300px;
				background-color: #fff;
				position: absolute;
				left: 0;
				top: 0;
				right: 0;
				bottom: 0;
				margin: auto;
				padding: 20px;
				box-sizing: border-box;
			}
 
			.modal .form input {
				width: 100%;
				height: 35px;
				margin-bottom: 20px;
			}
 
			.modal div span:nth-of-type(2) {
				float: right;
			}
 
			.modal .form div:nth-of-type(4) {
				width: 100%;
				text-align: center;
			}
</style>

<body>
 

		<div class="wrapper">
			<div>
				<input type="search" value="">
				<button class="search">查询</button>
			</div>
			<div class="tb">
				<table border="1" width="500">
					<thead>
						<tr>
							<th>id</th>
							<th>username</th>
							<th>password</th>
							<th></th>
						</tr>
					</thead>
					<tbody>
					    <tr>
							<td>1</td>
							<td>张三</td>
							<td>123456</td>
							<td>
								<button class="update">修改</button>
								<button class="del">删除</button>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>
</body>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
			$(function() {
                
				//点击查询
				$(".search").click(function(){
					//获取用户输入的关键词
					var  keywords = $("input[type=search]").val();

                                        alert(keywords);

                                        //向后台servlet请求ajax获取数据
                                        $.ajax(
                                          { 
                                               url: "listuser",
                                               data: {  uname: keywords },
                                               dataType: "json",
                                               success: function(result)
                                               {
                                                   //result: List<User>
                                                   //
                                                   if (result.code == "404")
                                                   {
                                                       alert("后台错误");       
                                                   }
                                                   else
                                                   {
                                                       // 用获取的数据进行当前页面表格的填充 
                                                       alert("当前用户数量：" + result.count);  
                                                       //清空表格
                                                       $("tr:not(:first)").remove();
                                                       $.each( result.data, function(index, value ){
                                                           tr = "<tr><td>" + value.id +  "</td><td>" + value.username  + "</td><td>" +  value.password  + "</td></tr>";    
                                                           $("table").append(tr); 
                                                       });
                                                   }
                                               }                                               
                                           }
                                        );
                                   
					//清空
					$("input[type=search]").val("");
				})
 
			})
</script>
